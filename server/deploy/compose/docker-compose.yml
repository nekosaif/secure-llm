services:
  secure-llm:
    image: secure-llm-server:dev
    build:
      context: ../..
      dockerfile: server/Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - ../../data:/app/data:rw
    environment:
      SECURE_LLM_CONFIG: /app/data/config.toml
    read_only: true
    tmpfs:
      - /dev/shm/secure-llm:size=8g,mode=0700
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/venv/bin/python", "-c",
              "import httpx,sys; sys.exit(0 if httpx.get('http://127.0.0.1:8443/healthz').status_code == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
