name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - name: pip-audit
        run: uv run pip-audit --strict
      - name: bandit
        run: uv run bandit -q -r protocol server client
      - name: trivy image (build only, no push)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
